<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" role="img">
  <title>Kirchhoff logo</title>
  <desc>Ícono de circuito de malla en verde sobre fondo oscuro</desc>

  <style>
    .bg       { fill: #161B22; }
    .wire     { stroke: #00C896; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .wire-dim { stroke: #00C89666; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .node-dot { fill: #00C896; }
    .source   { stroke: #00C896; stroke-width: 2.5; fill: none; }
    .resistor { stroke: #00C896; stroke-width: 2.5; fill: #161B22; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Fondo -->
  <rect x="0" y="0" width="160" height="160" rx="18" class="bg" stroke="#00C89633" stroke-width="1.5"/>

  <!-- Malla exterior -->
  <line x1="35" y1="28" x2="128" y2="28" class="wire"/>
  <line x1="132" y1="32" x2="132" y2="128" class="wire"/>
  <line x1="128" y1="132" x2="35" y2="132" class="wire"/>
  <line x1="31" y1="128" x2="31" y2="32" class="wire"/>

  <!-- Malla interior -->
  <line x1="51" y1="52" x2="108" y2="52" class="wire-dim"/>
  <line x1="112" y1="56" x2="112" y2="104" class="wire-dim"/>
  <line x1="108" y1="108" x2="51" y2="108" class="wire-dim"/>
  <line x1="47" y1="104" x2="47" y2="56" class="wire-dim"/>

  <!-- Resistencia top (zigzag horizontal) -->
  <polyline points="50,28 56,20 62,36 68,20 74,36 80,20 86,36 92,20 98,28" class="resistor"/>

  <!-- Fuente de voltaje izquierda (círculo con ~) -->
  <circle cx="31" cy="80" r="10" class="source"/>
  <text x="31" y="84" text-anchor="middle"
        font-family="JetBrains Mono, monospace"
        font-size="11" font-weight="700" fill="#00C896">~</text>

  <!-- Resistencia derecha (zigzag vertical) -->
  <polyline points="132,55 140,61 124,67 140,73 124,79 140,85 124,91 140,97 132,103" class="resistor"/>

  <!-- Resistencia bottom (zigzag horizontal) -->
  <polyline points="65,132 71,124 77,140 83,124 89,140 95,124 101,132" class="resistor"/>

  <!-- Nodos en esquinas -->
  <circle cx="31"  cy="28"  r="3.5" class="node-dot"/>
  <circle cx="132" cy="28"  r="3.5" class="node-dot"/>
  <circle cx="132" cy="132" r="3.5" class="node-dot"/>
  <circle cx="31"  cy="132" r="3.5" class="node-dot"/>

  <!-- Flecha de corriente de malla -->
  <defs>
    <marker id="arrowG" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#00C896"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <path d="M 70,65 A 18,18 0 1 1 69,66"
        stroke="#00C896" stroke-width="1.5" fill="none"
        stroke-linecap="round" marker-end="url(#arrowG)"/>

  <!-- Etiqueta I₁ -->
  <text x="81" y="88" text-anchor="middle"
        font-family="JetBrains Mono, monospace"
        font-size="11" font-weight="500" fill="#00C89699">I₁</text>

</svg>
